<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Projects — Sealand Property</title>
    <meta name="description" content="Browse our complete portfolio of premium properties across Australia.">
    <meta property="og:title" content="All Projects — Sealand Property">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/main/style.css?v=v2">
    <link rel="stylesheet" href="/projects/style.css?v=v2">
</head>
<body>
    <!-- Header shared markup (mirrors /main) — light placeholder; full template share is F10 scope -->
    <header class="header">
        <div class="header-zone header-zone-left">
            <a href="/main" class="logo" id="logo-link">
                <span id="site-logo-text" class="logo-text">SEALAND PROPERTY</span>
                <img id="site-logo-img" src="" alt="" style="display:none; height:40px; object-fit:contain;">
            </a>
        </div>
        <nav class="navbar" id="main-navbar">
            <div class="mobile-nav-header" style="display: none;">
                <div id="mobile-site-phone" class="mobile-site-phone"></div>
                <div id="mobile-account" class="mobile-account-name"></div>
            </div>
            <a class="nav-item" href="/main">HOME</a>
            <a class="nav-item nav-active" href="/projects">PROJECTS</a>
            <a class="nav-item" href="/about">ABOUT US</a>
            <a class="nav-item" href="/main#services">SERVICES</a>
            <a class="nav-item" href="/main#video">VIDEO</a>
            <a class="nav-item" href="/main#news">NEWS</a>
            <a class="nav-item" href="/main#footer">CONTACT</a>
            <a class="nav-item desktop-admin-btn" id="admin-btn" style="display: none;" onclick="window.location.href='/admin'">ADMIN</a>
            <button id="mobile-logout-btn" class="mobile-logout-btn" onclick="logoutAdmin()">LOGOUT</button>
        </nav>
        <div class="header-zone header-zone-right">
            <a href="javascript:void(0)" class="btn-header-phone" id="header-phone-btn">
                <i class="fa-solid fa-phone"></i>
                <span id="site-phone">phone number</span>
            </a>
            <div class="header-cta logged-out-cta">
                <a href="/main#footer" class="btn-book-consultation">BOOK CONSULTATION</a>
            </div>
            <div class="header-cta logged-in-cta" style="display: none;">
                <div class="account-name" id="account">Name</div>
                <button id="logout-btn" onclick="logoutAdmin()"><div>LOGOUT</div></button>
            </div>
        </div>
        <button class="menu-btn" id="menu-btn">
            <i class="fa-solid fa-bars"></i>
        </button>
    </header>
    <div class="mobile-overlay" id="mobile-overlay"></div>

    <main class="projects-page">
        <section class="projects-page-header">
            <span class="section-tagline">OUR PORTFOLIO</span>
            <h1 class="projects-page-title">All Projects</h1>
            <p class="projects-page-subtitle">Browse our complete portfolio of premium properties across Australia.</p>
        </section>

        <!-- v2: Property search bar (mirrors /main hero search bar) -->
        <section class="projects-page-search">
            <form id="property-search" class="property-search" onsubmit="handleProjectsSearch(event)">
                <div class="search-field">
                    <label>STATE</label>
                    <select name="state" id="search-state">
                        <option value="">All States</option>
                        <option value="NSW">NSW</option>
                        <option value="VIC">VIC</option>
                        <option value="QLD">QLD</option>
                        <option value="WA">WA</option>
                        <option value="SA">SA</option>
                        <option value="TAS">TAS</option>
                        <option value="ACT">ACT</option>
                        <option value="NT">NT</option>
                    </select>
                </div>
                <div class="search-field">
                    <label>SUBURB</label>
                    <select name="suburb" id="search-suburb">
                        <option value="">All Suburbs</option>
                        <option value="liverpool">Liverpool</option>
                        <option value="parramatta">Parramatta</option>
                        <option value="chatswood">Chatswood</option>
                        <option value="south-yarra">South Yarra</option>
                        <option value="surfers-paradise">Surfers Paradise</option>
                    </select>
                </div>
                <div class="search-field">
                    <label>PROPERTY TYPE</label>
                    <select name="type" id="search-type">
                        <option value="">All Types</option>
                        <option value="apartment">Apartment</option>
                        <option value="house">House</option>
                        <option value="townhouse">Townhouse</option>
                        <option value="land">Land</option>
                    </select>
                </div>
                <div class="search-field">
                    <label>PRICE RANGE</label>
                    <select name="price" id="search-price">
                        <option value="">Any Price</option>
                        <option value="500k-800k">$500k – $800k</option>
                        <option value="800k-1m">$800k – $1M</option>
                        <option value="1m-2m">$1M – $2M</option>
                        <option value="2m+">$2M+</option>
                    </select>
                </div>
                <button type="submit" class="btn-search-property">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    SEARCH
                </button>
            </form>
        </section>

        <!-- Active filter chips (populated by JS from query string) -->
        <section id="projects-filter-chips" class="projects-filter-chips"></section>

        <section class="projects-grid-wrapper">
            <div class="project-grid" id="projects-list-grid"></div>
            <div id="projects-empty" class="empty-state" style="display:none;">
                <p>No projects match your search.</p>
                <a href="/projects" class="btn-clear-filters">Clear filters</a>
            </div>
        </section>
    </main>

    <footer class="projects-page-footer">
        <p>© 2026 Sealand Property. <a href="/main">Back to home</a></p>
    </footer>

    <script src="/main/render.js?v=v2" defer></script>
    <script src="/main/script.js?v=v2" defer></script>
    <script src="/projects/list.js?v=v2" defer></script>
</body>
</html>
