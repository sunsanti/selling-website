<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/public/admin/style.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-building"></i>
                <h2>Admin Panel</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="/public/admin/index.html" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="/public/admin/settings.html" class="nav-item active"><i class="fas fa-cog"></i><span>Settings</span></a>
                <a href="/public/admin/projects.html" class="nav-item"><i class="fas fa-building"></i><span>Projects</span></a>
                <a href="/public/admin/contacts.html" class="nav-item"><i class="fas fa-address-book"></i><span>Contact List</span></a>
                <a href="/main" class="nav-item"><i class="fas fa-external-link-alt"></i><span>View Website</span></a>
                <a href="#" id="logout-link" class="nav-item logout"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1>Website Settings</h1>
                    <p>Edit your website logo, phone number, and main banner image.</p>
                </div>
            </div>

            <div class="form-card">
                <form id="settings-form">
                    <div class="form-group">
                        <label for="logo_url"><i class="fas fa-image"></i> Logo URL</label>
                        <input type="text" id="logo_url" placeholder="e.g., /assets/images/logo.png">
                        <small>Enter the path to your logo image.</small>
                    </div>
                    <div class="form-group">
                        <label for="phone_number"><i class="fas fa-phone"></i> Phone Number</label>
                        <input type="text" id="phone_number" placeholder="e.g., +1 234 567 890">
                    </div>
                    <div class="form-group">
                        <label for="main_image_url"><i class="fas fa-photo-video"></i> Main Banner Image URL</label>
                        <input type="text" id="main_image_url" placeholder="e.g., /assets/images/banner.jpg">
                        <small>Enter the path to the hero section banner image.</small>
                    </div>

                    <div class="preview-section">
                        <h3><i class="fas fa-eye"></i> Live Preview</h3>
                        <div class="preview-box">
                            <div class="preview-header">
                                <div class="preview-logo" id="preview-logo">
                                    <i class="fas fa-building"></i> LOGO
                                </div>
                                <div class="preview-phone" id="preview-phone">Phone Number</div>
                            </div>
                            <div class="preview-banner" id="preview-banner">
                                <img id="preview-main-img" src="" alt="" style="display:none;">
                                <div class="preview-placeholder" id="preview-placeholder">Main Banner Image</div>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="save-btn">
                            <i class="fas fa-save"></i> Save Settings
                        </button>
                        <div class="form-message" id="form-message"></div>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="/public/admin/script.js"></script>
    <script>
        async function loadSettings() {
            try {
                const res = await fetch('/api/settings');
                const s = await res.json();
                document.getElementById('logo_url').value = s.logo_url || '';
                document.getElementById('phone_number').value = s.phone_number || '';
                document.getElementById('main_image_url').value = s.main_image_url || '';
                updatePreview();
            } catch (err) { console.error(err); }
        }

        function updatePreview() {
            const logoVal = document.getElementById('logo_url').value;
            const phoneVal = document.getElementById('phone_number').value;
            const mainVal = document.getElementById('main_image_url').value;

            const logoEl = document.getElementById('preview-logo');
            if (logoVal) {
                logoEl.innerHTML = '';
                const img = document.createElement('img');
                img.src = logoVal; img.alt = 'Logo';
                img.style.height = '40px'; img.style.objectFit = 'contain';
                logoEl.appendChild(img);
            } else {
                logoEl.innerHTML = '<i class="fas fa-building"></i> LOGO';
            }

            document.getElementById('preview-phone').textContent = phoneVal || 'Phone Number';

            const mainImg = document.getElementById('preview-main-img');
            const placeholder = document.getElementById('preview-placeholder');
            if (mainVal) {
                mainImg.src = mainVal; mainImg.style.display = 'block';
                placeholder.style.display = 'none';
            } else {
                mainImg.style.display = 'none'; placeholder.style.display = 'flex';
            }
        }

        document.querySelectorAll('#settings-form input').forEach(i => i.addEventListener('input', updatePreview));

        document.getElementById('settings-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            const msg = document.getElementById('form-message');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            msg.textContent = ''; msg.className = 'form-message';

            try {
                const res = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        logo_url: document.getElementById('logo_url').value,
                        phone_number: document.getElementById('phone_number').value,
                        main_image_url: document.getElementById('main_image_url').value
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    msg.textContent = 'Settings saved successfully!';
                    msg.className = 'form-message success';
                } else {
                    msg.textContent = 'Error: ' + (data.error || 'Unknown');
                    msg.className = 'form-message error';
                }
            } catch (err) {
                msg.textContent = 'Network error. Please try again.';
                msg.className = 'form-message error';
            }
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Save Settings';
        });

        document.getElementById('logout-link').addEventListener('click', async (e) => {
            e.preventDefault();
            await fetch('/logout', { method: 'POST' });
            window.location.href = '/login';
        });

        loadSettings();
    </script>
</body>
</html>
